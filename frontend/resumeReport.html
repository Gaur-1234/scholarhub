    <!-- REPORT CONTENT -->



<section class="dashboard">

  <div class="container">


<div id="report-content">

  <h1>
    AI Resume Analysis Report
  </h1>

  <!-- SCORE CARD -->

  <div class="score-card">

    <h2 id="report-score">
      0/100
    </h2>

    <p id="report-verdict">
      Not Available
    </p>

  </div>

  <!-- STRENGTHS -->

  <div class="card">

    <h3>
      Strengths
    </h3>

    <ul id="strengths-list">

    </ul>

  </div>

  <!-- WEAKNESSES -->

  <div class="card">

    <h3>
      Weaknesses
    </h3>

    <ul id="weaknesses-list">

    </ul>

  </div>

  <!-- MISSING SKILLS -->

  <div class="card">

    <h3>
      Missing Skills
    </h3>

    <ul id="missing-skills-list">

    </ul>

  </div>

  <!-- SUMMARY -->

  <div class="card">

    <h3>
      AI Summary
    </h3>

    <p id="report-summary">

    </p>

  </div>

  <!-- SUGGESTIONS -->

  <div class="card">

    <h3>
      Suggestions
    </h3>

    <ul id="suggestions-list">

    </ul>

  </div>

</div>

<!-- DOWNLOAD BUTTON -->

<div class="download-section">

  <button id="download-report-btn">

    📄 Download Report

  </button>

</div>


  </div>
