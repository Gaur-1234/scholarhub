<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
>

<title>
Reset Password
</title>

<link
href="https://://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
rel="stylesheet"
>

<link
rel="stylesheet"
href="resetPassword.css"
>

</head>

<body>

<div class="bg-orb orb1"></div>
<div class="bg-orb orb2"></div>
<div class="bg-orb orb3"></div>

<div class="auth-container">

<div class="auth-card">

<div class="auth-header">

<h1>
Reset Password
</h1>

<p>
Enter the OTP received on your email and create a new password.
</p>

</div>

<form
id="reset-form"
class="auth-form"
>

<div class="input-group">

<label>
OTP Code
</label>

<input
type="text"
id="otp"
placeholder="Enter OTP"
required
>

</div>

<div class="input-group">

<label>
New Password
</label>

<div class="password-wrapper">

<input
type="password"
id="new-password"
placeholder="Enter new password"
required
>

<button
type="button"
id="toggle-new-password"
class="toggle-btn"
>

👁

</button>

</div>

</div>

<div class="input-group">

<label>
Confirm Password
</label>

<div class="password-wrapper">

<input
type="password"
id="confirm-password"
placeholder="Confirm password"
required
>

<button
type="button"
id="toggle-confirm-password"
class="toggle-btn"
>

👁

</button>

</div>

</div>

<button
type="submit"
class="primary-btn"
>

Reset Password

</button>

<div class="auth-footer">

<p>

Remember your password?

<a href="index.html">

Back To Login

</a>

</p>

</div>

</form>

</div>

</div>

<script src="resetPassword.js"></script>

</body>

</html>
