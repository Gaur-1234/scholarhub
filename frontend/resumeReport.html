<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
>

<title>Resume Report</title>

<link
rel="stylesheet"
href="resumeReport.css"
>

</head>

<body>

<div class="container">

<h1>
AI Resume Analysis Report
</h1>

<div class="score-card">

<h2 id="report-score">
0 / 100
</h2>

<p id="report-verdict">
Not Available
</p>

</div>

<div class="card">

<h3>Strengths</h3>

<ul id="strengths-list"></ul>

</div>

<div class="card">

<h3>Weaknesses</h3>

<ul id="weaknesses-list"></ul>

</div>

<div class="card">

<h3>Missing Skills</h3>

<ul id="missing-skills-list"></ul>

</div>

<div class="card">

<h3>AI Summary</h3>

<p id="report-summary"></p>

</div>

<div class="card">

<h3>Suggestions</h3>

<ul id="suggestions-list"></ul>

</div>

</div>

<script src="resumeReport.js"></script>

</body>

</html>
