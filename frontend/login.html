<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"

>

<title>
ScholarHub Login
</title>

<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
rel="stylesheet"
>

<link
rel="stylesheet"
href="login.css"
>

</head>

<body>

<div class="bg-orb orb1"></div>
<div class="bg-orb orb2"></div>
<div class="bg-orb orb3"></div>

<div class="auth-container">

<div class="auth-card">

<div class="auth-header">

<h1>
ScholarHub
</h1>

<p>
Welcome back. Sign in to continue.
</p>

</div>

<form
id="login-form"
class="auth-form"
>

<div class="input-group">

<label>
Email Address
</label>

<input
type="email"
id="email"
placeholder="Enter your email"
required

>

</div>

<div class="input-group">

<label>
Password
</label>

<div class="password-wrapper">

<input
type="password"
id="password"
placeholder="Enter your password"
required

>

<button
type="button"
id="toggle-password"
class="eye-btn"

>

👁

</button>

</div>

</div>

<button
type="submit"
class="primary-btn"

>

Login

</button>

<button
type="button"
id="otp-login-btn"
class="secondary-btn"

>

Login With OTP

</button>

<div class="auth-links">

<a href="forgotPassword.html">

Forgot Password?

</a>

</div>

<div class="auth-footer">

<p>

Don't have an account?

<a href="signup.html">

Create Account

</a>

</p>

</div>

</form>

</div>

</div>

<script src="login.js"></script>

</body>

</html>
